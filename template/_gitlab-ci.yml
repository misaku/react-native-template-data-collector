image: node:14

stages:
  - commit
  - install
  - test
  - review
  - report
  - gmud
  - build
  - tags
  - upload
  - deploy

default:
  cache:
    key: ${CI_PROJECT_NAME}-${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules
      - .yarn/cache
      - .yarn/unplugged
      - android/.gradle
      - android/app/build
    policy: pull-push


commitlint:
  image: $CIKNIFE_IMAGE
  stage: commit
  script: ci-knife commitlint
  only:
    - branches
  except:
    - master
    - main
    - tags

install:
  stage: install
  script:
    - yarn install --frozen-lockfile

test:
  stage: test
  script:
    - echo fs.inotify.max_user_watches=524288 | tee -a /etc/sysctl.conf && sysctl -p
    - yarn test:ci
  coverage: /All files[^|]*\|[^|]*\s+([\d\.]+)/
  variables:
    API_BASE_URL: $API_BASE_URL_STAGE
    API_TOKEN: $API_TOKEN_STAGE
  dependencies:
    - install
  artifacts:
    when: always
    paths:
      - coverage
    expire_in: 1 day

review:
  image: $CIKNIFE_IMAGE
  stage: review
  script: ci-knife mr-review
  only:
    - merge_requests

